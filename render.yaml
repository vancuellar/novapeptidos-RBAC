services:
  - type: web
    name: nova-peptides-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: nova_peptides
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://novapeptidos.mx,https://www.novapeptidos.mx
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
